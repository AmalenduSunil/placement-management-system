{% extends "base.html" %}

{% block title %}Edit Company - Admin{% endblock %}
{% block body_class %}dashboard-page{% endblock %}

{% block content %}
{% set f = form_data or {} %}
<div class="dashboard-container">
    <div class="header-section" style="display: flex; justify-content: space-between; align-items: center;">
        <div style="text-align: left;">
            <div class="logo-circle" style="margin: 0;">CEC</div>
            <h1 style="font-size: 1.8rem; margin-top: 10px;">Edit Company</h1>
            <p style="opacity: 0.8; margin-top: 6px;">ID: {{ company.id }} • Status: {{ company.status or '-' }}</p>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <a href="{{ url_for('admin_companies') }}" class="dash-btn" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid white;">Back</a>
            <a href="/admin/logout" class="dash-btn" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid white;">Logout</a>
        </div>
    </div>

    <div class="chart-container" style="height: auto; min-height: 200px;">
        <form method="POST" action="{{ url_for('admin_edit_company', company_id=company.id) }}" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px;">
            <div class="input-group">
                <input type="text" name="company_name" required value="{{ f.get('company_name', company.company_name or '') }}" placeholder=" ">
                <label>Company Name</label>
            </div>
            <div class="input-group">
                <input type="text" name="industry" value="{{ f.get('industry', company.industry or '') }}" placeholder=" ">
                <label>Industry</label>
            </div>
            <div class="input-group">
                <input type="text" name="contact_person" value="{{ f.get('contact_person', company.contact_person or '') }}" placeholder=" ">
                <label>Contact Person</label>
            </div>
            <div class="input-group">
                <input type="email" name="contact_email" value="{{ f.get('contact_email', company.contact_email or '') }}" placeholder=" ">
                <label>Contact Email</label>
            </div>
            <div class="input-group">
                <input type="tel" name="contact_phone" value="{{ f.get('contact_phone', company.contact_phone or '') }}" placeholder=" ">
                <label>Contact Phone</label>
            </div>
            <div class="input-group">
                <input type="url" name="website" value="{{ f.get('website', company.website or '') }}" placeholder=" ">
                <label>Website (https://...)</label>
            </div>
            <div class="input-group">
                <input type="text" name="registration_number" value="{{ f.get('registration_number', company.registration_number or '') }}" placeholder=" ">
                <label>Registration Number</label>
            </div>
            <div class="input-group">
                <input type="text" name="gst_number" value="{{ f.get('gst_number', company.gst_number or '') }}" placeholder=" ">
                <label>GST Number</label>
            </div>
            <div class="input-group" style="grid-column: 1 / -1;">
                <input type="text" name="address" value="{{ f.get('address', company.address or '') }}" placeholder=" ">
                <label>Address</label>
            </div>
            <div class="input-group" style="grid-column: 1 / -1;">
                <textarea name="description" placeholder=" " style="width: 100%; min-height: 90px; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: white;">{{ f.get('description', company.description or '') }}</textarea>
                <label style="position: relative; top: -6px;">Description</label>
            </div>
            <div style="grid-column: 1 / -1; text-align: center;">
                <button type="submit" class="submit-btn" style="width: 320px; margin: 0 auto;">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
