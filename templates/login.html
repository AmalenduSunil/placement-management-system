{% extends "base.html" %}

{% block title %}Login - CEC{% endblock %}

{% block body_class %}login-page{% endblock %}

{% block content %}
<div class="card">
    <div class="logo-circle">CEC</div>
    <h2>Student Login</h2>
    <p style="font-size: 0.9rem; margin-bottom: 25px; opacity: 0.8;">Enter your credentials to access the portal</p>

    <form method="POST" action="{{ url_for('login_page') }}">
        <div class="input-group">
            <input type="email" name="email" id="email" required placeholder=" ">
            <label for="email">Email Address</label>
        </div>

        <div class="input-group">
            <input type="password" name="password" id="password" required placeholder=" ">
            <label for="password">Password</label>
            <i class="bi bi-eye-slash" id="togglePassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: rgba(255,255,255,0.6); z-index: 10;"></i>
        </div>

        <button type="submit" class="submit-btn">Login</button>
    </form>
    
    <div style="margin-top: 20px; font-size: 0.85rem;">
        Don't have an account? <a href="{{ url_for('student_signup') }}" style="color: #ff69b4; text-decoration: none; font-weight: 600;">Register</a>
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');

    togglePassword.addEventListener('click', function (e) {
        // Toggle the type attribute
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        
        // Toggle the icon
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
    });
</script>
{% if logged_out %}
<script>
    // After logout: pressing Back from login should go to welcome page.
    history.pushState({ afterLogout: true }, "", window.location.href);
    window.addEventListener("popstate", function () {
        window.location.replace("{{ url_for('welcome_page') }}");
    });
</script>
{% endif %}
{% endblock %}
