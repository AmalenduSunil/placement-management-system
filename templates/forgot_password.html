{% extends "base.html" %}

{% block title %}Forgot Password - CEC{% endblock %}

{% block body_class %}login-page{% endblock %}

{% block content %}
<div class="card">
    <div class="logo-circle">CEC</div>
    <h2>Forgot Password</h2>
    <p style="font-size: 0.9rem; margin-bottom: 25px; opacity: 0.8;">
        Enter your registered email to receive a password reset link.
    </p>

    <form method="POST" action="{{ url_for('student_forgot_password') }}">
        <div class="input-group">
            <input type="email" name="email" id="email" required placeholder=" ">
            <label for="email">Email Address</label>
        </div>

        <button type="submit" class="submit-btn">Send Reset Link</button>
    </form>

    <div class="login-link">
        Remembered your password?
        <a href="{{ url_for('login_page') }}" style="color: #ff69b4; text-decoration: none; font-weight: 600;">Back to Login</a>
    </div>
</div>
{% endblock %}
