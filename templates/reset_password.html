{% extends "base.html" %}

{% block title %}Reset Password - CEC{% endblock %}

{% block body_class %}login-page{% endblock %}

{% block content %}
<div class="card">
    <div class="logo-circle">CEC</div>
    <h2>Reset Password</h2>
    <p style="font-size: 0.9rem; margin-bottom: 25px; opacity: 0.8;">
        Set a new password for your student account.
    </p>

    <form method="POST" action="{{ url_for('student_reset_password', token=token) }}">
        <div class="input-group">
            <input type="password" name="password" id="password" required placeholder=" ">
            <label for="password">New Password</label>
            <i class="bi bi-eye-slash" id="togglePassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: rgba(255,255,255,0.6); z-index: 10;"></i>
        </div>

        <div class="input-group">
            <input type="password" name="confirm_password" id="confirm_password" required placeholder=" ">
            <label for="confirm_password">Confirm Password</label>
            <i class="bi bi-eye-slash" id="toggleConfirmPassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: rgba(255,255,255,0.6); z-index: 10;"></i>
        </div>

        <button type="submit" class="submit-btn">Update Password</button>
    </form>

    <div class="login-link">
        <a href="{{ url_for('login_page') }}" style="color: #ffffff; opacity: 0.9; text-decoration: none;">&larr; Back to Login</a>
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');
    const toggleConfirmPassword = document.querySelector('#toggleConfirmPassword');
    const confirmPassword = document.querySelector('#confirm_password');

    togglePassword.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
    });

    toggleConfirmPassword.addEventListener('click', function () {
        const type = confirmPassword.getAttribute('type') === 'password' ? 'text' : 'password';
        confirmPassword.setAttribute('type', type);
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
    });
</script>
{% endblock %}
